<!-- Show title
Show search input
Show genre dropdown
Show results area -->

<!DOCTYPE html>
<html>
<head>
    <title>Movie Recommender</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <h1>Movie Recommender</h1>

    <section>
        <h2>Search by movie or actor</h2>
        <input id="searchInput" type="text" placeholder="Search for Creed, Batman, Michael B. Jordan...">
        <button id="searchButton">Search</button>
    </section>

    <section>
        <h2>Pick a genre</h2>
        <select id="genreSelect">
            <option value="">Choose a genre</option>
            <option value="Drama">Drama</option>
            <option value="Action">Action</option>
            <option value="Comedy">Comedy</option>
            <option value="Horror">Horror</option>
        </select>
        <button id="genreButton">Get Recommendations</button>
    </section>

    <section>
        <h2>Results</h2>
        <div id="results"></div>
    </section>

    <script src="script.js"></script>
</body>
</html>
